<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>3D Satellite Tracker</title>

  <!-- Cesium -->
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <!-- satellite.js -->
  <script src="https://unpkg.com/satellite.js/dist/satellite.min.js"></script>

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #searchBox {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="searchBox">
  <input type="text" id="satName" placeholder="Satellite name (English)">
  <button onclick="startTracking()">Track</button>
</div>

<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4ZTE5OGM0NS05OThlLTRkZTQtYTc4OC03NjMyYjNmMTdkZjciLCJpZCI6NDExNzUwLCJpYXQiOjE3NzQ5NDk1MDZ9.lJE0ZMZMP2EWVqlsfKoLC2rhjBognW4WZzn9e_ZQKFw"; // حط التوكن تبعك هنا

// إنشاء الخريطة
const viewer = new Cesium.Viewer('cesiumContainer', {
  shouldAnimate: true
});

let entity;

// الدالة المعدلة لتتبع الأقمار
async function startTracking() {
  const searchName = document.getElementById("satName").value.toLowerCase();

  try {
    const res = await fetch("https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=json");
    const data = await res.json();

    const sat = data.find(s =>
      (s.OBJECT_NAME || "").toLowerCase().includes(searchName)
    );

    console.log("FOUND:", sat);

    if (!sat) {
      alert("القمر غير موجود ❌");
      return;
    }

    const satrec = satellite.twoline2satrec(sat.TLE_LINE1, sat.TLE_LINE2);

    if (entity) viewer.entities.remove(entity);

    entity = viewer.entities.add({
      name: sat.OBJECT_NAME,
      position: new Cesium.CallbackProperty(function () {
        const now = new Date();
        const posVel = satellite.propagate(satrec, now);
        if (!posVel.position) return;

        const gmst = satellite.gstime(now);
        const geo = satellite.eciToGeodetic(posVel.position, gmst);

        return Cesium.Cartesian3.fromDegrees(
          satellite.degreesLong(geo.longitude),
          satellite.degreesLat(geo.latitude),
          geo.height * 1000
        );
      }, false),
      point: {
        pixelSize: 10,
        color: Cesium.Color.YELLOW
      }
    });

    viewer.trackedEntity = entity;
    viewer.zoomTo(entity);

  } catch (e) {
    console.error(e);
    alert("صار خطأ أثناء تحميل بيانات الأقمار ❌");
  }
}
</script>

</body>
</html>
